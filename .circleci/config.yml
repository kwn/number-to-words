version: 2.1

commands:
  qlty-coverage-publish:
    steps:
      - run:
          name: Install Qlty CLI
          command: curl https://qlty.sh | sh
      - run:
          name: Upload coverage to Qlty
          command: ~/.qlty/bin/qlty coverage publish build/logs/clover.xml
  build:
    steps:
      - run:
          name: Install dependencies
          command: composer install
      - run:
          name: Install xdebug
          command: sudo pecl install xdebug
      - run:
          name: Check coding style (PSR12)
          command: make phpcs
      - run:
          name: Run unit tests
          command: make phpunit-coverage

jobs:
  build:
    parameters:
      php_version:
        type: string
    docker:
      - image: cimg/php:<< parameters.php_version >>
    resource_class: small
    steps:
      - checkout
      - build
      - store_artifacts:
          path: build/logs/coverage
      - when:
          condition:
            equal: ["8.5", << parameters.php_version >>]
          steps:
            - qlty-coverage-publish

workflows:
  ci:
    jobs:
      - build:
          name: build-php-<< matrix.php_version >>
          matrix:
            parameters:
              php_version: ["8.2", "8.3", "8.4", "8.5"]
